<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnet de bord — Formation IA &amp; Marketing · Eureden / D'Aucy France</title>
<style>
/* ==========================================================================
   CARNET DE BORD NUMÉRIQUE — Formation « L'IA au service du Marketing »
   Adaptation Eureden / D'Aucy France — Programme Cegos 9585 — Sowaycom
   Charte : vert légume dominant, accent jaune maïs, blanc. Mobile-first.
   2 jours — Sessions 15-16 juin & 6-7 juillet 2026.
   ========================================================================== */
:root{
  --vert:#1b6e34;          /* vert principal */
  --vert-fonce:#0f4d22;    /* variante foncée */
  --vert-clair:#2b8c4a;    /* variante claire */
  --jaune:#e8a90c;         /* accent jaune maïs */
  --jaune-clair:#fdf4dd;   /* fond jaune très pâle */
  --blanc:#ffffff;
  --fond:#f4f8f4;          /* fond général */
  --carte:#ffffff;
  --texte:#1d271f;
  --texte-doux:#4a5a4e;
  --bord:#d3ddd4;
  --valide:#1e7042;
  --valide-clair:#e7f4ec;
  --erreur:#a8321a;
  --erreur-clair:#fdeeea;
  --focus:#0f4d22;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
  background:var(--fond);color:var(--texte);line-height:1.55;
}
a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible,[tabindex]:focus-visible{
  outline:3px solid var(--focus);outline-offset:2px;border-radius:4px;
}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}

/* ----- En-tête fixe ----- */
header.appbar{
  position:sticky;top:0;z-index:50;background:var(--vert-fonce);color:var(--blanc);
  padding:.65rem 1rem;box-shadow:0 2px 8px rgba(0,0,0,.25);
}
.appbar .ligne1{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.logo-chip{background:#fff;border-radius:8px;padding:.25rem .5rem;display:flex;align-items:center;flex:0 0 auto}
.logo-chip img{height:30px;width:auto;display:block}
.appbar .badge-op{
  background:var(--jaune);color:#23290f;font-weight:700;font-size:.72rem;
  padding:.2rem .55rem;border-radius:99px;letter-spacing:.05em;white-space:nowrap;
}
.appbar h1{font-size:1rem;font-weight:700;flex:1;min-width:200px}
.appbar .qui{font-size:.8rem;opacity:.95}
.btn-export{
  background:#fff;color:var(--vert-fonce);border:none;font-weight:700;font-size:.8rem;
  padding:.45rem .8rem;border-radius:6px;cursor:pointer;
}
.btn-export:hover{background:#e9f2ea}
.progress-wrap{margin-top:.55rem}
.progress-info{display:flex;justify-content:space-between;font-size:.72rem;margin-bottom:.2rem;opacity:.95}
.progress-bar{height:10px;background:rgba(255,255,255,.25);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;width:0;background:var(--jaune);border-radius:99px;transition:width .4s ease}

/* ----- Navigation par étapes ----- */
nav.etapes{
  display:flex;gap:.4rem;overflow-x:auto;padding:.6rem 1rem;background:var(--carte);
  border-bottom:1px solid var(--bord);position:sticky;top:auto;align-items:center;
}
nav.etapes .sep-jour{
  flex:0 0 auto;font-size:.68rem;font-weight:800;color:var(--vert-fonce);
  background:var(--jaune-clair);border:1px solid var(--jaune);border-radius:6px;
  padding:.2rem .45rem;letter-spacing:.04em;white-space:nowrap;
}
nav.etapes button{
  flex:0 0 auto;border:1.5px solid var(--bord);background:#fff;color:var(--texte);
  border-radius:99px;padding:.35rem .8rem;font-size:.78rem;font-weight:600;cursor:pointer;white-space:nowrap;
}
nav.etapes button.actif{background:var(--vert);border-color:var(--vert);color:#fff}
nav.etapes button.fait{border-color:var(--valide);color:var(--valide)}
nav.etapes button.fait.actif{background:var(--vert);color:#fff}
nav.etapes button.fait::before{content:"✓ "}
nav.etapes button.verrou{opacity:.45;cursor:not-allowed}
nav.etapes button.verrou::before{content:"🔒 "}

/* ----- Contenu ----- */
main{max-width:880px;margin:0 auto;padding:1rem 1rem 4rem}
.carte{
  background:var(--carte);border:1px solid var(--bord);border-radius:14px;
  padding:1.3rem 1.4rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(15,77,34,.06);
}
.etape-entete{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:.4rem}
.horaire{
  background:var(--vert-fonce);color:#fff;font-weight:700;font-size:.78rem;
  padding:.2rem .6rem;border-radius:6px;
}
.duree{
  background:var(--jaune-clair);color:#6e5408;border:1px solid var(--jaune);
  font-weight:700;font-size:.78rem;padding:.18rem .55rem;border-radius:6px;
}
.jour-chip{
  background:#eef5ef;color:var(--vert-fonce);border:1px solid var(--vert-clair);
  font-weight:700;font-size:.78rem;padding:.18rem .55rem;border-radius:6px;
}
.cdc-chip{
  background:#eef;color:#283593;border:1px solid #b9c0e8;
  font-weight:700;font-size:.72rem;padding:.15rem .5rem;border-radius:6px;
}
h2{color:var(--vert-fonce);font-size:1.35rem;margin:.2rem 0 .8rem}
h3{color:var(--vert-fonce);font-size:1.05rem;margin:1.1rem 0 .45rem}
p{margin:.45rem 0}
.objectif{
  background:var(--valide-clair);border-left:4px solid var(--valide);
  padding:.6rem .8rem;border-radius:0 8px 8px 0;margin:.7rem 0;font-size:.95rem;
}
ul.consigne{margin:.4rem 0 .4rem 1.2rem}
ul.consigne li{margin:.45rem 0}
.note{font-size:.85rem;color:var(--texte-doux)}

/* ----- Rappel du cas ----- */
details.rappel-cas{
  background:var(--jaune-clair);border:1px solid var(--jaune);border-radius:10px;
  padding:.6rem .9rem;margin:.7rem 0;
}
details.rappel-cas summary{font-weight:700;color:#6e5408;cursor:pointer}
details.rappel-cas p{font-size:.9rem;margin:.4rem 0}

/* ----- Choix du cas ----- */
.cas-grille{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.8rem;margin:.7rem 0}
.cas-choix{
  text-align:left;background:#fff;border:2px solid var(--bord);border-radius:12px;
  padding:.9rem;cursor:pointer;font-family:inherit;
}
.cas-choix:hover{border-color:var(--vert-clair)}
.cas-choix.choisi{border-color:var(--vert);background:var(--valide-clair)}
.cas-choix .embleme{font-size:1.6rem;display:block;margin-bottom:.3rem}
.cas-choix h3{margin:.1rem 0 .3rem;font-size:1rem}
.cas-choix p{font-size:.85rem;color:var(--texte-doux);margin:0}
.brief-complet{
  background:#f6faf6;border:1px solid var(--bord);border-radius:10px;padding:.9rem;margin:.8rem 0;
}
.brief-complet dl{display:grid;grid-template-columns:auto 1fr;gap:.25rem .8rem;font-size:.92rem}
.brief-complet dt{font-weight:700;color:var(--vert-fonce)}

/* ----- Prompt box ----- */
.prompt-box{
  background:var(--vert-fonce);color:#eef5ef;border-radius:10px;
  padding:.8rem .9rem;margin:.8rem 0;position:relative;
}
.prompt-box .ptitre{font-weight:700;font-size:.85rem;margin-bottom:.4rem;color:var(--jaune)}
.prompt-box pre{
  white-space:pre-wrap;word-break:break-word;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;
  font-size:.82rem;line-height:1.5;
}
.prompt-box mark{background:var(--jaune);color:#23290f;border-radius:4px;padding:0 .25em}
.btn-copier{
  position:absolute;top:.6rem;right:.6rem;background:var(--jaune);color:#23290f;border:none;
  font-weight:700;font-size:.75rem;padding:.35rem .7rem;border-radius:6px;cursor:pointer;
}
.btn-copier.ok{background:var(--valide);color:#fff}

/* ----- Champs ----- */
label{display:block;font-weight:700;font-size:.9rem;margin:.8rem 0 .25rem;color:var(--vert-fonce)}
input[type=text],input[type=date],textarea,select{
  width:100%;border:1.5px solid var(--bord);border-radius:8px;padding:.55rem .7rem;
  font-family:inherit;font-size:.92rem;background:#fff;color:var(--texte);
}
textarea{min-height:110px;resize:vertical}
input:focus,textarea:focus,select:focus{border-color:var(--vert)}
.aide-champ{font-size:.8rem;color:var(--texte-doux);margin:.2rem 0 0}

/* ----- Auto-évaluation ----- */
fieldset.autoeval{border:1.5px solid var(--bord);border-radius:10px;padding:.7rem .9rem;margin:.9rem 0}
fieldset.autoeval legend{font-weight:700;font-size:.88rem;color:var(--vert-fonce);padding:0 .4rem}
label.case{display:flex;gap:.55rem;align-items:flex-start;font-weight:400;font-size:.9rem;margin:.45rem 0;cursor:pointer}
label.case input{margin-top:.2rem;accent-color:var(--vert)}

/* ----- Quiz ----- */
.question{border:1px solid var(--bord);border-radius:10px;padding:.8rem .9rem;margin:.7rem 0}
.qtitre{font-weight:700;margin-bottom:.5rem}
.reponses{display:grid;gap:.45rem}
.reponses button{
  text-align:left;background:#fff;border:1.5px solid var(--bord);border-radius:8px;
  padding:.55rem .7rem;font-family:inherit;font-size:.9rem;cursor:pointer;
}
.reponses button:hover:not(:disabled){border-color:var(--vert-clair)}
.reponses button.bonne{border-color:var(--valide);background:var(--valide-clair);font-weight:700}
.reponses button.mauvaise{border-color:var(--erreur);background:var(--erreur-clair)}
.feedback{display:none;font-size:.88rem;border-radius:8px;padding:.5rem .7rem;margin-top:.45rem}
.feedback.visible{display:block}
.feedback.vrai{background:var(--valide-clair);color:var(--valide)}
.feedback.faux{background:var(--erreur-clair);color:var(--erreur)}
.score-final{
  background:var(--vert-fonce);color:#fff;font-weight:700;border-radius:10px;
  padding:.7rem .9rem;margin:.8rem 0;
}

/* ----- Boutons ----- */
.zone-boutons{display:flex;gap:.7rem;flex-wrap:wrap;margin-top:1rem}
.btn{
  border:none;border-radius:8px;font-weight:700;font-size:.95rem;cursor:pointer;
  padding:.7rem 1.3rem;font-family:inherit;
}
.btn-principal{background:var(--vert);color:#fff}
.btn-principal:hover{background:var(--vert-fonce)}
.btn-principal:disabled{background:#c9d4ca;cursor:not-allowed}
.btn-secondaire{background:#fff;color:var(--vert-fonce);border:1.5px solid var(--vert-fonce)}
.btn-secondaire:hover{background:#eef5ef}
.confirmation{
  display:none;background:var(--valide-clair);color:var(--valide);font-weight:700;
  padding:.55rem .8rem;border-radius:8px;margin-top:.6rem;font-size:.9rem;
}
.confirmation.visible{display:block}

/* ----- Accueil / agenda ----- */
.agenda{width:100%;border-collapse:collapse;font-size:.85rem;margin:.6rem 0}
.agenda td{border-bottom:1px solid var(--bord);padding:.4rem .5rem;vertical-align:top}
.agenda td:first-child{font-weight:700;color:var(--vert-fonce);white-space:nowrap;width:5.2rem}
.agenda tr.tete-jour td{
  background:var(--vert-fonce);color:#fff;font-weight:800;border-radius:4px;
}
.banniere-fin{
  background:linear-gradient(135deg,var(--vert-fonce),var(--vert-clair));color:#fff;
  border-radius:12px;padding:1.4rem;text-align:center;margin:.8rem 0;
}
.banniere-fin .gros{font-size:1.5rem;font-weight:800;margin-bottom:.4rem}

/* ----- Impression : seul le récapitulatif s'imprime ----- */
#zone-impression{display:none}
@media print{
  body *{visibility:hidden}
  #zone-impression,#zone-impression *{visibility:visible}
  #zone-impression{
    display:block;position:absolute;top:0;left:0;width:100%;
    font-size:11pt;color:#000;background:#fff;padding:0;
  }
  #zone-impression h1{font-size:16pt;color:#0f4d22;margin-bottom:4pt}
  #zone-impression h2{font-size:13pt;color:#0f4d22;border-bottom:1.5pt solid #e8a90c;padding-bottom:2pt;margin:12pt 0 6pt;page-break-after:avoid}
  #zone-impression h3{font-size:11.5pt;margin:8pt 0 3pt}
  #zone-impression .bloc-livrable{border:1pt solid #999;border-radius:4pt;padding:6pt;margin:4pt 0;white-space:pre-wrap;page-break-inside:avoid}
  #zone-impression .meta{color:#444;font-style:italic;margin-bottom:8pt}
  #zone-impression ul{margin-left:14pt}
}
</style>
</head>

/* ==========================================================================
   ÉTAT & PERSISTANCE — tout est sauvegardé dans localStorage (clé unique).
   Aucune donnée n'est envoyée à un serveur : tout reste dans le navigateur.
   ========================================================================== */
const CLE_STOCKAGE = "carnet_eureden_ia_v1";

const etatParDefaut = () => ({
  prenom: "", equipe: "", cas: "",
  unlocked: 0,                    // index max d'étape accessible
  done: {},                       // { numéroÉtape: true }
  quizFin: {}, quizReveil: {},    // { indexQuestion: indexRéponseChoisie }
  champs: {}                      // toutes les saisies texte/checkbox { clé: valeur }
});

let etat = chargerEtat();
let etapeCourante = Math.min(etat.unlocked, DERNIERE_ETAPE);

function chargerEtat() {
  try {
    const brut = localStorage.getItem(CLE_STOCKAGE);
    if (brut) return Object.assign(etatParDefaut(), JSON.parse(brut));
  } catch (e) { /* stockage indisponible : on repart à zéro */ }
  return etatParDefaut();
}
function sauvegarder() {
  try { localStorage.setItem(CLE_STOCKAGE, JSON.stringify(etat)); } catch (e) { /* quota plein */ }
  majProgression();
  majNav();
}

/* ----- Aides ----- */
function echapper(t) {
  return String(t == null ? "" : t)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function $(sel, racine) { return (racine || document).querySelector(sel); }
function $$(sel, racine) { return Array.from((racine || document).querySelectorAll(sel)); }

/* Substitue {variable:cle} par la donnée du cas choisi ; surligne le reste. */
function preparerPrompt(modele, pourHtml) {
  const cas = CAS[etat.cas];
  let txt = modele;
  if (cas) {
    txt = txt.replace(/\{variable:nomcas\}/g, cas.nom)
             .replace(/\{variable:produit\}/g, cas.produit)
             .replace(/\{variable:cible\}/g, cas.cible)
             .replace(/\{variable:objectif\}/g, cas.objectif)
             .replace(/\{variable:ton\}/g, cas.ton);
  } else {
    txt = txt.replace(/\{variable:(\w+)\}/g, "{$1 — choisissez d'abord votre cas fil rouge}");
  }
  if (!pourHtml) return txt;
  return echapper(txt).replace(/\{([^}]+)\}/g, "<mark>{$1}</mark>");
}

/* Copie dans le presse-papiers avec solution de repli. */
function copierTexte(texte, bouton) {
  const ok = () => {
    bouton.classList.add("ok"); bouton.textContent = "✓ Copié !";
    setTimeout(() => { bouton.classList.remove("ok"); bouton.textContent = "Copier le prompt"; }, 2200);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(texte).then(ok).catch(() => replis());
  } else { replis(); }
  function replis() {
    const ta = document.createElement("textarea");
    ta.value = texte; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); ok(); } catch (e) { alert("Copie impossible : sélectionnez le texte manuellement."); }
    document.body.removeChild(ta);
  }
}

/* ==========================================================================
   PROGRESSION & NAVIGATION (avec séparateurs Jour 1 / Jour 2)
   ========================================================================== */
function nbEtapesFaites() { return ETAPES.filter(e => etat.done[e.id]).length; }

function majProgression() {
  const pct = Math.round(nbEtapesFaites() / ETAPES.length * 100);
  $("#progress-fill").style.width = pct + "%";
  $("#progress-texte").textContent = pct + " % — " + nbEtapesFaites() + "/" + ETAPES.length + " étapes";
  $("#progress-aria").setAttribute("aria-valuenow", pct);
  const ident = [];
  if (etat.prenom) ident.push(etat.prenom);
  if (etat.equipe) ident.push("Équipe " + etat.equipe);
  if (etat.cas && CAS[etat.cas]) ident.push(CAS[etat.cas].embleme + " " + CAS[etat.cas].nom);
  $("#affichage-identite").textContent = ident.join(" · ");
}

function majNav() {
  const nav = $("#nav-etapes");
  nav.innerHTML = "";
  let jourCourant = 0;
  ETAPES.forEach(e => {
    if (e.jour !== jourCourant) {
      jourCourant = e.jour;
      const sep = document.createElement("span");
      sep.className = "sep-jour";
      sep.textContent = "JOUR " + jourCourant;
      nav.appendChild(sep);
    }
    const b = document.createElement("button");
    b.type = "button";
    b.textContent = e.nav;
    const verrouille = e.id > etat.unlocked;
    if (verrouille) { b.classList.add("verrou"); b.setAttribute("aria-disabled", "true"); b.title = "Étape verrouillée : terminez d'abord les étapes précédentes."; }
    if (etat.done[e.id]) b.classList.add("fait");
    if (e.id === etapeCourante) { b.classList.add("actif"); b.setAttribute("aria-current", "step"); }
    b.addEventListener("click", () => { if (!verrouille) afficherEtape(e.id); });
    nav.appendChild(b);
  });
}

function afficherEtape(n) {
  etapeCourante = n;
  rendre(n);
  majNav();
  window.scrollTo({ top: 0, behavior: "smooth" });
  $("#contenu").focus({ preventScroll: true });
}

function validerEtape(n, messageId) {
  etat.done[n] = true;
  etat.unlocked = Math.max(etat.unlocked, Math.min(n + 1, DERNIERE_ETAPE));
  sauvegarder();
  if (messageId) { const m = $("#" + messageId); if (m) m.classList.add("visible"); }
}

  return '<details class="rappel-cas"><summary>Rappel de votre brief — ' + echapper(c.nom) + "</summary>" +
    "<p><strong>Contexte :</strong> " + echapper(c.contexte) + "</p>" +

}
function champTexte(cle, label, type, aide) {
  const val = echapper(etat.champs[cle] || "");
  const id = "champ_" + cle;
  let html = '<label for="' + id + '">' + echapper(label) + "</label>";
  if (type === "court") html += '<input type="text" id="' + id + '" data-cle="' + cle + '" value="' + val + '">';
  else html += '<textarea id="' + id + '" data-cle="' + cle + '">' + val + "</textarea>";
  if (aide) html += '<p class="aide-champ">' + echapper(aide) + "</p>";
  return html;
}
function casesAutoEval(prefixe, criteres, titre) {
  let html = '<fieldset class="autoeval"><legend>' + echapper(titre || "Auto-évaluation — cochez ce qui est vrai pour votre livrable") + "</legend>";
  criteres.forEach((c, i) => {
    const cle = prefixe + "_crit" + i;
    const coche = etat.champs[cle] ? " checked" : "";
    html += '<label class="case"><input type="checkbox" data-cle="' + cle + '"' + coche + "><span>" + echapper(c) + "</span></label>";
  });
  return html + "</fieldset>";
}
function chipsCdc(cdc) {
  if (!cdc || !cdc.length) return "";
  return cdc.map(c => '<span class="cdc-chip">' + echapper(c) + "</span>").join(" ");
}

/* ==========================================================================
   QUIZ — rendu et logique (feedback immédiat, score, rejouer)
   ========================================================================== */
function rendreQuiz(quiz, cleQuiz, etapeNum) {
  const zoneQ = $("#zone-quiz");
  zoneQ.innerHTML = quiz.map((q, i) => {
    const repondu = etat[cleQuiz][i];
    return '<div class="question" data-q="' + i + '"><p class="qtitre">' + (i + 1) + ". " + echapper(q.q) + "</p>" +
      '<div class="reponses" role="group" aria-label="Réponses question ' + (i + 1) + '">' +
      q.r.map((r, j) => {
        let cls = "";
        if (repondu != null) {
          if (j === q.bonne) cls = "bonne";
          else if (j === repondu) cls = "mauvaise";
        }
        return '<button type="button" class="' + cls + '" data-q="' + i + '" data-r="' + j + '"' + (repondu != null ? " disabled" : "") + ">" + echapper(r) + "</button>";
      }).join("") + "</div>" +
      '<p class="feedback ' + (repondu != null ? "visible " + (repondu === q.bonne ? "vrai" : "faux") : "") + '" id="fb-' + i + '" role="status">' +
      (repondu != null ? (repondu === q.bonne ? "✅ Exact ! " : "❌ Pas tout à fait. ") + echapper(q.fb) : "") + "</p></div>";
  }).join("");

  function majScore() {
    const reponses = Object.keys(etat[cleQuiz]).length;
    if (reponses === quiz.length) {
      let score = 0;
      quiz.forEach((q, i) => { if (etat[cleQuiz][i] === q.bonne) score++; });
      const sf = $("#score-final");
      sf.style.display = "block";
      const com = score === quiz.length ? "Sans faute, impressionnant !" :
        score >= quiz.length * 0.7 ? "Très solide — les bases sont là." :
        "L'essentiel est de réactiver : relisez les corrections, elles resserviront toute la journée.";
      sf.textContent = "Votre score : " + score + " / " + quiz.length + " — " + com;
      $("#btn-valider-quiz").disabled = false;
    }
  }
  majScore();

  zoneQ.addEventListener("click", ev => {
    const b = ev.target.closest("button[data-r]");
    if (!b || b.disabled) return;
    const i = +b.dataset.q, j = +b.dataset.r;
    etat[cleQuiz][i] = j;
    sauvegarder();
    const bloc = b.closest(".question");
    $$("button[data-r]", bloc).forEach(x => {
      x.disabled = true;
      const xj = +x.dataset.r;
      if (xj === quiz[i].bonne) x.classList.add("bonne");
      else if (xj === j) x.classList.add("mauvaise");
    });
    const fb = $("#fb-" + i);
    fb.classList.add("visible", j === quiz[i].bonne ? "vrai" : "faux");
    fb.textContent = (j === quiz[i].bonne ? "✅ Exact ! " : "❌ Pas tout à fait. ") + quiz[i].fb;
    majScore();
  });

  $("#btn-rejouer").addEventListener("click", () => {
    etat[cleQuiz] = {};
    sauvegarder();
    rendre(etapeNum);
  });
  $("#btn-valider-quiz").addEventListener("click", () => {
    validerEtape(etapeNum, "conf-quiz");
  });
}

/* ==========================================================================
   BRANCHEMENT DES ÉVÉNEMENTS PAR ÉTAPE
   ========================================================================== */
function brancherEvenements(n) {
  const zone = $("#contenu");

  /* Étape 0 : démarrage */
  const bd = $("#btn-demarrer");
  if (bd) bd.addEventListener("click", () => {
    if (!etat.prenom || !etat.equipe) {
      alert("Indiquez votre prénom et le nom de votre équipe pour commencer — c'est votre carnet, il doit porter vos couleurs !");
      return;
    }
    validerEtape(0, "conf-0");
    setTimeout(() => afficherEtape(1), 600);
  });

  /* Étape 2 : choix du cas */
  $$(".cas-choix", zone).forEach(b => b.addEventListener("click", () => {
    etat.cas = b.dataset.cas;
    sauvegarder();
    $$(".cas-choix", zone).forEach(x => { x.classList.toggle("choisi", x === b); x.setAttribute("aria-pressed", x === b ? "true" : "false"); });
    $("#btn-valider-cas").disabled = false;
    afficherBrief();
  }));
  function afficherBrief() {
    const zb = $("#zone-brief"); if (!zb) return;
    const c = CAS[etat.cas];
    zb.innerHTML = !c ? "" : '<div class="brief-complet"><h3>' + c.embleme + " " + echapper(c.nom) + " — " + echapper(c.accroche) + "</h3><dl>" +
      "<dt>Contexte</dt><dd>" + echapper(c.contexte) + "</dd>" +
      "<dt>Cible</dt><dd>" + echapper(c.cible) + "</dd>" +
      "<dt>Objectif</dt><dd>" + echapper(c.objectif) + "</dd>" +
      "<dt>Ton</dt><dd>" + echapper(c.ton) + "</dd>" +
      "<dt>Ressources</dt><dd>" + echapper(c.ressources) + "</dd></dl></div>";
  }
  if (n === 2) afficherBrief();
  const bvc = $("#btn-valider-cas");
  if (bvc) bvc.addEventListener("click", () => { if (etat.cas) validerEtape(2, "conf-2"); });

  /* Boutons « copier le prompt » */
  $$(".btn-copier", zone).forEach(b => b.addEventListener("click", () => {
    const m = MISSIONS.find(x => x.id === b.dataset.mission);
    if (m) copierTexte(preparerPrompt(m.prompt, false), b);
  }));

  /* Validation d'un atelier : au moins le premier livrable doit être rempli. */
  $$("[data-valide-mission]", zone).forEach(b => b.addEventListener("click", () => {
    const num = +b.dataset.valideMission;
    const m = MISSIONS.find(x => x.etape === num);
    const premier = etat.champs[m.livrables[0].cle];
    if (!premier || !premier.trim()) {
      alert("Renseignez d'abord votre livrable principal : c'est lui qui nourrira votre plan d'action !");
      return;
    }
    validerEtape(num, "conf-" + num);
  }));

  /* Validations simples */
  $$("[data-valide-simple]", zone).forEach(b => b.addEventListener("click", () => {
    const num = +b.dataset.valideSimple;
    validerEtape(num, "conf-" + num);
  }));

  /* Étape 20 : clôture */
  const bt = $("#btn-terminer");
  if (bt) bt.addEventListener("click", () => {
    validerEtape(20);
    $("#banniere-fin").style.display = "block";
    $("#banniere-fin").scrollIntoView({ behavior: "smooth" });
  });

  ["btn-export-2", "btn-export-3"].forEach(id => { const b2 = $("#" + id); if (b2) b2.addEventListener("click", exporterCarnet); });
}

    '<p class="meta">« L\'IA au service du Marketing » (Cegos 9585, adaptation Eureden) — ' + echapper(date) + "<br>" +
    "Apprenant·e : <strong>" + echapper(etat.prenom || "—") + "</strong> · Équipe : <strong>" + echapper(etat.equipe || "—") + "</strong>" +
    (c ? " · Brief : <strong>" + echapper(c.nom) + "</strong>" : "") + " · Progression : " + nbEtapesFaites() + "/" + ETAPES.length + " étapes</p>";

  function bloc(titre, contenu) {
    if (!contenu || !String(contenu).trim()) return "";
    return "<h3>" + echapper(titre) + '</h3><div class="bloc-livrable">' + echapper(contenu) + "</div>";
  }
  function scoreQuiz(quiz, reponses) {
    const nb = Object.keys(reponses).length;
    if (!nb) return "Non réalisé.";
    let s = 0; quiz.forEach((q, i) => { if (reponses[i] === q.bonne) s++; });
    return "Score : " + s + " / " + quiz.length + (nb < quiz.length ? " (quiz incomplet)" : "");
  }

  /* Positionnement */
  let pos = "";
  if (etat.champs["niveau"]) pos += "<p>Niveau de départ : <strong>" + echapper(etat.champs["niveau"]) + "</strong></p>";
  ["attente1", "attente2", "attente3"].forEach((k, i) => { if (etat.champs[k]) pos += "<p>Attente " + (i + 1) + " : " + echapper(etat.champs[k]) + "</p>"; });
  pos += bloc("Usage actuel de Gemini", etat.champs["usage_actuel"]);
  if (pos) h += "<h2>Positionnement (Jour 1)</h2>" + pos;

  if (c) h += "<h2>Mon brief fil rouge</h2><p><strong>" + echapper(c.nom) + "</strong> — " + echapper(c.accroche) + "</p>";

  /* Ateliers & missions */
  MISSIONS.forEach(m => {
    let corps = "";
    m.livrables.forEach(l => { corps += bloc(l.label, etat.champs[l.cle]); });
    const coches = m.criteres.filter((cr, i) => etat.champs[m.id + "_crit" + i]);
    if (coches.length) corps += "<h3>Auto-évaluation validée</h3><ul>" + coches.map(x => "<li>" + echapper(x) + "</li>").join("") + "</ul>";
    if (corps) h += "<h2>" + echapper(m.titre) + " (" + m.horaire + (m.cdc && m.cdc.length ? " · " + m.cdc.join(", ") : "") + ")</h2>" + corps;
  });

  /* Synthèse J1 */
  let synj1 = "<p>" + scoreQuiz(QUIZ_J1FIN, etat.quizFin) + "</p>" +
    bloc("Ce que je teste dès demain", etat.champs["teste_demain"]) +
    bloc("Séquence préférée du Jour 1", etat.champs["sequence_pref"]);
  h += "<h2>Synthèse &amp; ancrage Jour 1 (17h00)</h2>" + synj1;

  /* Réveil J2 */
  h += "<h2>Réveil pédagogique Jour 2 (09h00)</h2><p>" + scoreQuiz(QUIZ_REVEIL, etat.quizReveil) + "</p>" +
    bloc("Nom + slogan d'équipe (généré avec Gemini)", etat.champs["slogan_j2"]);

  /* Veille & projet */
  let veille = bloc("Thème de veille prioritaire", etat.champs["veille_theme"]) +
    bloc("Routine de veille", etat.champs["veille_routine"]) +
    bloc("Premier usage gestion de projet", etat.champs["projet_usage"]);
  if (veille) h += "<h2>Veille IA &amp; gestion de projet (CDC 7-8)</h2>" + veille;

  /* Plan d'action */
  let plan = "";
  [["1", "À 30 jours — je teste"], ["2", "À 60 jours — j'approfondis"], ["3", "À 90 jours — j'internalise"]].forEach(p => {
    const eng = etat.champs["plan" + p[0] + "_engagement"];
    if (eng && eng.trim()) {
      plan += "<h3>" + p[1] + "</h3><div class=\"bloc-livrable\">" + echapper(eng) +
        "\nOutil : " + echapper(etat.champs["plan" + p[0] + "_outil"] || "—") +
        "\nIndicateur : " + echapper(etat.champs["plan" + p[0] + "_indicateur"] || "—") + "</div>";
    }
  });
  if (etat.champs["plan_binome"] || etat.champs["plan_date"]) {
    plan += "<p>Binôme de redevabilité : <strong>" + echapper(etat.champs["plan_binome"] || "—") +
      "</strong> · Premier point d'étape : <strong>" + echapper(etat.champs["plan_date"] || "—") + "</strong></p>";
  }
  if (plan) h += "<h2>Plan d'action 30 / 60 / 90 jours</h2>" + plan;

  let evalq = bloc("Quiz d'évaluation des acquis", etat.champs["lien_quiz"]) +
    bloc("Questionnaire de satisfaction", etat.champs["lien_satisfaction"]) +
    bloc("Mes attentes sont-elles satisfaites ?", etat.champs["objectif_atteint"]);
  if (evalq) h += "<h2>Évaluations Qualiopi</h2>" + evalq;

  h += '<p class="meta">Document généré localement par le carnet de bord numérique — aucune donnée n\'a quitté ce navigateur (RGPD). Formation animée dans le respect des règles de la cellule IA Eureden.</p>';
  z.innerHTML = h;
  window.print();
}

/* ==========================================================================
   INITIALISATION
   ========================================================================== */
(function init() {
  etat.champs["prenom_tmp"] = etat.prenom;
  etat.champs["equipe_tmp"] = etat.equipe;
  $("#btn-export").addEventListener("click", exporterCarnet);

  /* Sauvegarde automatique de TOUTES les saisies (délégation attachée UNE fois). */
  $("#contenu").addEventListener("input", ev => {
    const el = ev.target;
    if (!el.dataset || !el.dataset.cle) return;
    etat.champs[el.dataset.cle] = el.type === "checkbox" ? (el.checked ? "1" : "") : el.value;
    if (el.dataset.cle === "prenom_tmp") etat.prenom = el.value.trim();
    if (el.dataset.cle === "equipe_tmp") etat.equipe = el.value.trim();
    sauvegarder();
  });
  majProgression();
  majNav();
  rendre(etapeCourante);
})();
</script>
</body>
</html>
